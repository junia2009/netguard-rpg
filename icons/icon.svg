<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Grid lines (cyber world) -->
  <g stroke="#00ccff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Outer hex ring -->
  <polygon points="256,80 400,160 400,340 256,420 112,340 112,160"
           fill="none" stroke="#00ccff" stroke-width="2" stroke-opacity="0.15" filter="url(#glow)"/>

  <!-- Data streams (background decoration) -->
  <g stroke="#00ccff" stroke-opacity="0.12" stroke-width="1.5">
    <line x1="80" y1="140" x2="180" y2="140"/>
    <line x1="80" y1="155" x2="150" y2="155"/>
    <line x1="332" y1="370" x2="432" y2="370"/>
    <line x1="362" y1="355" x2="432" y2="355"/>
  </g>

  <!-- Player character (TRON-style program) -->
  <g filter="url(#glow-strong)">
    <!-- Body -->
    <rect x="196" y="176" width="120" height="140" rx="4" fill="#001830"/>
    <rect x="196" y="176" width="120" height="140" rx="4"
          fill="none" stroke="#00ccff" stroke-width="4"/>

    <!-- Circuit lines inside body -->
    <path d="M236 176 L236 240 L276 240 L276 316"
          fill="none" stroke="#00ccff" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M226 220 L246 220" fill="none" stroke="#00ccff" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M266 260 L286 260" fill="none" stroke="#00ccff" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- Core light -->
    <rect x="246" y="236" width="20" height="20" rx="2" fill="#00ffff"/>
    <rect x="249" y="239" width="14" height="14" rx="1" fill="#66ffff" opacity="0.8"/>

    <!-- Direction indicator (up arrow) -->
    <rect x="248" y="164" width="16" height="8" rx="1" fill="#00ffcc"/>

    <!-- Shield / weapon glow lines -->
    <line x1="186" y1="200" x2="186" y2="290" stroke="#00ffcc" stroke-width="3" stroke-opacity="0.6"/>
    <line x1="326" y1="200" x2="326" y2="290" stroke="#00ffcc" stroke-width="3" stroke-opacity="0.6"/>
  </g>

  <!-- Bottom text area glow -->
  <text x="256" y="400" text-anchor="middle"
        font-family="Consolas, Monaco, monospace" font-size="30" font-weight="bold"
        fill="#00ccff" opacity="0.5" filter="url(#glow)">NETGUARD://</text>

  <!-- Scan line effect -->
  <g opacity="0.04">
    <rect x="0" y="0" width="512" height="2" fill="white"/>
    <rect x="0" y="8" width="512" height="2" fill="white"/>
    <rect x="0" y="16" width="512" height="2" fill="white"/>
    <rect x="0" y="24" width="512" height="2" fill="white"/>
    <rect x="0" y="32" width="512" height="2" fill="white"/>
    <rect x="0" y="40" width="512" height="2" fill="white"/>
    <rect x="0" y="48" width="512" height="2" fill="white"/>
    <rect x="0" y="56" width="512" height="2" fill="white"/>
    <rect x="0" y="64" width="512" height="2" fill="white"/>
    <rect x="0" y="72" width="512" height="2" fill="white"/>
    <rect x="0" y="80" width="512" height="2" fill="white"/>
  </g>
</svg>
