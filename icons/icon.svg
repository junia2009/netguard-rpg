<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#00ccff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Hex ring -->
  <polygon points="256,82 398,162 398,342 256,422 114,342 114,162"
           fill="none" stroke="#00ccff" stroke-width="2" stroke-opacity="0.12"/>

  <!-- Player character (close-up) -->
  <g filter="url(#glow)">
    <!-- Body -->
    <rect x="148" y="120" width="215" height="256" rx="4" fill="#001830"/>
    <rect x="148" y="120" width="215" height="256" rx="4"
          fill="none" stroke="#00ccff" stroke-width="6"/>

    <!-- Circuit lines -->
    <path d="M219 120 L219 240 L293 240 L293 376"
          fill="none" stroke="#00ccff" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M170 305 L256 305"
          fill="none" stroke="#00ccff" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M280 200 L340 200"
          fill="none" stroke="#00ccff" stroke-opacity="0.5" stroke-width="3"/>

    <!-- Core light -->
    <rect x="225" y="217" width="62" height="62" rx="3" fill="#00ffff"/>
    <rect x="234" y="226" width="44" height="44" rx="2" fill="#66ffff" opacity="0.8"/>

    <!-- Direction indicator -->
    <rect x="243" y="105" width="26" height="10" rx="2" fill="#00ffcc"/>

    <!-- Shield lines -->
    <line x1="135" y1="146" x2="135" y2="350" stroke="#00ffcc" stroke-width="4" stroke-opacity="0.6"/>
    <line x1="376" y1="146" x2="376" y2="350" stroke="#00ffcc" stroke-width="4" stroke-opacity="0.6"/>
  </g>

  <!-- Title text -->
  <text x="256" y="418" text-anchor="middle"
        font-family="Consolas, Monaco, monospace" font-size="30" font-weight="bold"
        fill="#00ccff" opacity="0.5" filter="url(#glow)">NETGUARD://</text>
</svg>
