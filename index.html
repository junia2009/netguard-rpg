<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NETGUARD:// - サイバーアクションRPG</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-container">
  <!-- タイトル画面 -->
  <div id="title-screen">
    <h1>NETGUARD://</h1>
    <p class="subtitle">〜 電脳防衛戦記 〜</p>
    <div class="menu-options">
      <button id="btn-new-game">はじめから</button>
      <button id="btn-continue" class="hidden">つづきから <span id="save-info"></span></button>
    </div>
    <p class="controls-hint controls-hint-pc">
      移動: WASD / 矢印キー ｜ 攻撃: Space ｜ 会話: Enter<br>
      アイテム使用: X ｜ インベントリ: I ｜ セーブ: Q
    </p>
    <p class="controls-hint controls-hint-mobile">
      十字キー: 移動 ｜ A: 攻撃 ｜ B: 会話/決定 ｜ Y: アイテム<br>
      SAVE: セーブ ｜ MENU: インベントリ
    </p>
  </div>

  <!-- ゲームキャンバス -->
  <canvas id="game-canvas" width="800" height="600"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hud-bars">
      <div class="bar-container">
        <span class="bar-label">HP</span>
        <div class="bar hp-bar"><div class="bar-fill hp-fill" id="hp-fill"></div></div>
        <span class="bar-text" id="hp-text">100/100</span>
      </div>
      <div class="bar-container">
        <span class="bar-label">MP</span>
        <div class="bar mp-bar"><div class="bar-fill mp-fill" id="mp-fill"></div></div>
        <span class="bar-text" id="mp-text">50/50</span>
      </div>
      <div class="bar-container">
        <span class="bar-label">EXP</span>
        <div class="bar exp-bar"><div class="bar-fill exp-fill" id="exp-fill"></div></div>
        <span class="bar-text" id="exp-text">0/100</span>
      </div>
    </div>
    <div id="hud-info">
      <span id="hud-level">Lv.1</span>
      <span id="hud-gold">◆ 0G</span>
      <span id="hud-map">⬡ ホームサーバー</span>
    </div>
  </div>

  <!-- ダイアログ -->
  <div id="dialogue-box" class="hidden">
    <div id="dialogue-name"></div>
    <div id="dialogue-text"></div>
    <div id="dialogue-choices"></div>
    <div id="dialogue-next">▼</div>
  </div>

  <!-- インベントリ画面 -->
  <div id="inventory-screen" class="hidden overlay">
    <div class="overlay-panel">
      <h2>インベントリ</h2>
      <div id="inventory-tabs">
        <button class="tab active" data-tab="items">アイテム</button>
        <button class="tab" data-tab="equip">装備</button>
        <button class="tab" data-tab="status">ステータス</button>
      </div>
      <div id="inventory-content"></div>
      <button class="close-btn" id="close-inventory">閉じる</button>
    </div>
  </div>

  <!-- ショップ画面 -->
  <div id="shop-screen" class="hidden overlay">
    <div class="overlay-panel">
      <h2 id="shop-title">ショップ</h2>
      <div id="shop-gold">所持金: 0G</div>
      <div id="shop-content"></div>
      <button class="close-btn" id="close-shop">閉じる</button>
    </div>
  </div>

  <!-- ゲームオーバー -->
  <div id="gameover-screen" class="hidden overlay">
    <div class="overlay-panel gameover">
      <h2>GAME OVER</h2>
      <p>プログラムがクラッシュしました...</p>
      <button id="btn-retry">ホームサーバーに再起動</button>
    </div>
  </div>

  <!-- レベルアップ通知 -->
  <div id="levelup-notification" class="hidden">
    <span>⬆ LEVEL UP!</span>
  </div>

  <!-- ダメージ数字コンテナ -->
  <div id="damage-numbers"></div>

  <!-- ボス HP バー -->
  <div id="boss-hp-bar" class="hidden">
    <div id="boss-name">ゼロデイ</div>
    <div class="bar boss-bar"><div class="bar-fill boss-fill" id="boss-hp-fill"></div></div>
  </div>

  <!-- タッチコントロール（ゲームボーイ風） -->
  <div id="touch-controls" class="hidden">
    <div id="gb-body">
      <div id="gb-controls-row">
        <!-- 十字キー -->
        <div id="gb-dpad">
          <div class="dpad-cross">
            <button class="dpad-btn dpad-up" data-dir="up" aria-label="上">▲</button>
            <button class="dpad-btn dpad-left" data-dir="left" aria-label="左">◀</button>
            <div class="dpad-center-dot"></div>
            <button class="dpad-btn dpad-right" data-dir="right" aria-label="右">▶</button>
            <button class="dpad-btn dpad-down" data-dir="down" aria-label="下">▼</button>
          </div>
        </div>
        <!-- A/B/Yボタン（三角配置） -->
        <div id="gb-ab">
          <button class="ab-btn" id="btn-touch-item">Y</button>
          <div class="ab-row">
            <button class="ab-btn" id="btn-touch-interact">B</button>
            <button class="ab-btn" id="btn-touch-attack">A</button>
          </div>
        </div>
      </div>
      <div id="gb-center-btns">
        <button class="center-btn" id="btn-touch-save">SAVE</button>
        <button class="center-btn" id="btn-touch-inv">MENU</button>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/engine.js"></script>
<script src="js/entities.js"></script>
<script src="js/combat.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
